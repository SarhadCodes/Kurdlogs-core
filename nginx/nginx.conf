# MUST be 1 for nginx-rtmp: published streams, rtmp_stat, and HLS state are
# per-worker and are NOT shared across workers. With multiple workers the
# publisher (OBS), the consumer (Control Room encoder), and the /stat poller
# land on different workers and cannot see each other — the stream appears as
# nclients=0, the consumer gets "Error opening input: I/O error", and HLS never
# shows up. A single worker keeps the entire RTMP pipeline in one process.
worker_processes 1;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1936;
        chunk_size 4096;
        
        application live {
            live on;
            record off;
            allow publish all;
            allow play all;

            on_publish http://backend:3001/api/mcr/ingest/on-publish?secret=kurdlogs-mcr-ingest-secret;
            on_publish_done http://backend:3001/api/mcr/ingest/on-publish-done?secret=kurdlogs-mcr-ingest-secret;

            hls on;
            hls_path /tmp/hls;
            hls_fragment 4;
            hls_playlist_length 60;
            hls_cleanup on;
        }
    }
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 8080;
        server_name localhost;
        
        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Origin, Content-Type, Accept, Authorization' always;
        
        # HLS streams
        location /hls {
            alias /var/streams;
            
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin * always;
        }
        
        # Secure token validation
        # Format: /secure/hls/<token>/<channel_slug>/
        location ~ ^/secure/hls/([^/]+)/([^/]+)/(.*)$ {
            alias /var/streams/$2/$3;
            
            auth_request /auth;
            
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin * always;
        }
        location = /auth {
            internal;
            proxy_pass http://backend:3001/api/tokens/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }
        
        # Health check
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        
        # Stats
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
    }
}
